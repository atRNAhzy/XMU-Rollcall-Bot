name: auto-sign-a

on:
  schedule:
    # =========================
    # 时间点填写位置（UTC，精确到分）
    # 规则：分钟 小时 日 月 星期
    # 例：每周一 01:30 UTC 触发： "30 1 * * 1"
    # 你要 5 个定时就写 5 行；超过 5 个请复制本文件为 b/c 再填
    # =========================
    - cron: "30 22 * * 7"   # TODO_1
    - cron: "35 22 * * 7"   # TODO_2
    - cron: "40 22 * * 7"   # TODO_3
    - cron: "45 22 * * 7"   # TODO_4
    - cron: "50 22 * * 7"   # TODO_5
    

  workflow_dispatch:

concurrency:
  group: auto-sign
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TZ: Asia/Shanghai
      # odd=单周 even=双周 any=不区分
      WEEK_PARITY: "any"
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba (conda)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Install repo CLI (editable)
        shell: bash
        run: |
          set -euo pipefail
          micromamba run -n autosign python -V
          micromamba run -n autosign pip install -U pip
          micromamba run -n autosign pip install -e ./xmu-rollcall-cli

      - name: Run auto_sign.py (max 20 min)
        shell: bash
        run: |
          set -euo pipefail
          echo "Now (Shanghai): $(TZ=Asia/Shanghai date '+%F %T %Z')"

          # 单双周可选：按 ISO 周数（01-53）
          WEEK_NUM=$(TZ=Asia/Shanghai date +%V)
          MOD=$((10#$WEEK_NUM % 2))

          if [ "${WEEK_PARITY}" = "odd" ] && [ "${MOD}" -ne 1 ]; then
            echo "Even ISO week (${WEEK_NUM}); WEEK_PARITY=odd -> exit."
            exit 0
          fi
          if [ "${WEEK_PARITY}" = "even" ] && [ "${MOD}" -ne 0 ]; then
            echo "Odd ISO week (${WEEK_NUM}); WEEK_PARITY=even -> exit."
            exit 0
          fi

          # 20 分钟强制结束
          micromamba run -n myenv timeout 1200s python auto_sign.py